<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recibo de Reserva - Condominio Sundara</title>
    
    <!-- Meta tags para evitar caché -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- CSS Personalizado -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Botones de acción -->
    <div class="no-print action-buttons">
        <button class="btn-action btn-print" onclick="window.print()">
            <span>🖨️</span> Imprimir Documento
        </button>
        <button class="btn-action btn-save" onclick="saveAsPDF()">
            <span>💾</span> Guardar como PDF
        </button>
        <button class="btn-action btn-reset" onclick="resetForm()">
            <span>↺</span> Limpiar Formulario
        </button>
    </div>

    <!-- Contenido principal -->
    <div id="Hoja1" class="container py-3">
        <!-- ... todo el contenido HTML del formulario ... -->
        <!-- (Mantén exactamente el mismo HTML que ya tienes) -->
    </div>

    <!-- Scripts -->
    <!-- html2pdf.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Funciones del formulario -->
    <script src="js/form-functions.js"></script>
    
    <!-- Generador de PDF -->
    <script src="js/pdf-generator.js"></script>
</body>
</html>
